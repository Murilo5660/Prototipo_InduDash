<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <title>InduDash</title>
</head>
<body>
    
    <!-- Barra Lateral -->
    <section id="barra_lateral">
        <a href="#" class="brand">
            <i class='bx bxs-smile'></i>
            <span class="text">InduDash</span>
        </a>

        <ul class="side-menu top">

            <li class="active">
                <a href="#">
                    <i class='bx bxs-bar-chart-alt-2'></i>
                    <span class="text">Gráficos</span>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class='bx bxs-buildings'></i>
                    <span class="text">Setor Industrial 3</span>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class='bx bxs-buildings'></i>
                    <span class="text">Setor Industrial 2</span>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class='bx bxs-buildings'></i>
                    <span class="text">Setor Industrial 1</span>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class='bx bxs-bank' ></i>
                    <span class="text">Banco</span>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class='bx bxs-store-alt'></i>
                    <span class="text">Comércio</span>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class='bx bx-group'></i>
                    <span class="text">Equipe</span>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class='bx bxs-cog'></i>
                    <span class="text">Configurações</span>
                </a>
            </li>

            <li>
                <a href="#" class="logout">
                    <i class='bx bx-log-out-circle'></i>
                    <span class="text">Encerrar seção</span>
                </a>
            </li>

        </ul>
    </section>
    <!-- Barra Lateral -->

    <!-- CONTENT -->
     <section id="content">
        <!-- Barra de Navegação-->
         <nav>
            <i class='bx bx-menu' ></i>
            <a href="#" class="nav-link">Categorias</a>
            <form>
                <div class="form-input">
                    <input type="search" placeholder="Procurar">
                    <button type="submit" class="search-btn"><i class="bx bx-search"></i></button>
                </div>
            </form>
            <a href="#" class="notificacao">
                <i class='bx bxs-bell' ></i>
                <span class="num">8</span>
            </a>
            <a href="#" class="perfil">
                <img src="img/perfil.png">
            </a>
         </nav>
         <!-- Barra de Navegação-->
     </section>
     <!-- CONTENT -->
    
     <script src="script.js"></script>
</body>
</html>
